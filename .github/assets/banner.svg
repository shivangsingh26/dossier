<svg viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg" width="900" height="190">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070d14"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#070d14"/>
    </linearGradient>
    <radialGradient id="glow" cx="450" cy="90" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="240" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="25%" stop-color="#3b82f6"/>
      <stop offset="75%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="190" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle centre glow -->
  <ellipse cx="450" cy="90" rx="300" ry="110" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="898" height="188" rx="11" fill="none" stroke="#1a2332" stroke-width="1"/>

  <!-- Left/right blue side bars -->
  <rect x="1" y="28" width="2.5" height="134" rx="1" fill="#3b82f6" opacity="0.45"/>
  <rect x="896.5" y="28" width="2.5" height="134" rx="1" fill="#3b82f6" opacity="0.45"/>

  <!-- Title — blue-tinted white -->
  <text x="450" y="106"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="72"
        font-weight="800"
        letter-spacing="20"
        text-anchor="middle"
        text-rendering="geometricPrecision"
        fill="#e8f4ff">DOSSIER</text>

  <!-- Blue accent underline -->
  <line x1="240" y1="124" x2="660" y2="124"
        stroke="url(#accentLine)" stroke-width="2" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="450" y="158"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="4.5"
        text-anchor="middle"
        text-rendering="geometricPrecision"
        fill="#4b6a8a">APPLY SMARTER · REACH EARLIER · IMPROVE EVERY WEEK</text>
</svg>
