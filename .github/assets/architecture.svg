  <text x="46" y="123" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" fill="#cbd5e1">Indeed  ·  LinkedIn</text>
  <text x="46" y="138" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">10 profile-driven search terms</text>
  <text x="46" y="152" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">Rule-based pre-filter  ·  ~60% eliminated free</text>
  <text x="46" y="166" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">LLM scoring  x8 parallel workers</text>
  <text x="46" y="182" font-family="'Courier New', Courier, monospace" font-size="9" fill="#374e6a">~550 raw  ->  ~220 scored  ->  ~57 ranked (~31 high)</text>
