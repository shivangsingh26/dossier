<svg viewBox="0 0 900 730" xmlns="http://www.w3.org/2000/svg" width="900" height="730">

  <!-- Background -->
  <rect width="900" height="730" fill="#0d1117" rx="14"/>
  <rect x="1" y="1" width="898" height="728" rx="13" fill="none" stroke="#1a2332" stroke-width="1"/>

  <!-- ── PROFILE.JSON ── -->
  <rect x="28" y="18" width="844" height="52" rx="6" fill="#161b22" stroke="#3b82f6" stroke-width="1"/>
  <rect x="28" y="18" width="3" height="52" rx="2" fill="#3b82f6"/>
  <text x="46" y="37" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="700" fill="#e8f4ff">profile/profile.json</text>
  <text x="204" y="37" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4b6a8a">  —  single source of truth  ·  all agents read at runtime  ·  zero hardcoded values</text>
  <text x="46" y="57" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9" fill="#374e6a">name  ·  target_roles  ·  skills[depth: can_teach / can_architect / can_use]  ·  search_terms  ·  watchlist  ·  exp_band  ·  salary_floor  ·  location  ·  known_gaps</text>

