  <text x="482" y="138" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">Greenhouse  ·  Lever  ·  LinkedIn f_C=</text>
  <text x="482" y="152" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">ML title filter  +  pre-filter</text>
  <text x="482" y="166" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">LLM scoring  x8 parallel workers</text>
  <text x="482" y="182" font-family="'Courier New', Courier, monospace" font-size="9" fill="#374e6a">70 cos  ->  ~40 raw  ->  ~10 scored (~6 high)</text>
  <text x="482" y="200" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9" fill="#4b5563">~3 min  ·  $0.01/run  ·  4 fetch strategies  ·  ID cache</text>
