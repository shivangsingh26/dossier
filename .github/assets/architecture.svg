  <text x="46" y="658" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">Pass 2 — Haiku: keyword  ·  hallucination  ·  LaTeX  ·  ordering audit</text>
