  <text x="46" y="570" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9" fill="#4b5563">$0.73 one-time  ·  incremental after  ·  192/193 JDs complete  ·  gpt-5.4-mini</text>

